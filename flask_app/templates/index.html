<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Language Translator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-between font-sans">

    <header class="bg-white shadow-xs border-b border-slate-200 py-4 px-6">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <i class="fa-solid fa-language text-indigo-600 text-3xl"></i>
                <h1 class="text-xl font-bold text-slate-800">PolyGlot <span class="text-indigo-600">AI</span></h1>
            </div>
            <span class="text-xs bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full font-medium">Flask Core Engine</span>
        </div>
    </header>

    <main class="flex-grow max-w-6xl w-full mx-auto p-4 md:p-6 flex flex-col justify-center">
        <div class="bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
            
            <div class="bg-slate-50 border-b border-slate-200 p-4 flex flex-col sm:flex-row items-center justify-between gap-4">
                <div class="w-full sm:w-auto flex items-center space-x-2">
                    <select id="sourceLang" class="w-full sm:w-48 bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-700 focus:outline-hidden focus:ring-2 focus:ring-indigo-500">
                        <option value="Auto-Detect">🌐 Auto-Detect</option>
                        {% for lang in languages %}
                        <option value="{{ lang.name }}">{{ lang.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <button id="swapLanguages" class="text-slate-400 hover:text-indigo-600 transition p-2 rounded-full hover:bg-slate-200">
                    <i class="fa-solid fa-right-left hidden sm:inline"></i>
                    <i class="fa-solid fa-arrows-up-down inline sm:hidden"></i>
                </button>

                <div class="w-full sm:w-auto flex items-center space-x-2">
                    <select id="targetLang" class="w-full sm:w-48 bg-white border border-slate-300 rounded-lg px-3 py-2 text-sm text-slate-700 focus:outline-hidden focus:ring-2 focus:ring-indigo-500">
                        {% for lang in languages %}
                        <option value="{{ lang.name }}" {% if lang.code == 'es' %}selected{% endif %}>{{ lang.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 divide-y md:divide-y-0 md:divide-x divide-slate-200 min-h-[300px]">
                
                <div class="p-4 flex flex-col justify-between">
                    <textarea id="inputText" placeholder="Type or paste your text here..." class="w-full h-48 md:h-64 resize-none border-0 p-2 text-slate-800 focus:outline-hidden text-lg" maxlength="5000"></textarea>
                    <div class="flex justify-between items-center pt-3 border-t border-slate-100 text-xs text-slate-400">
                        <span id="charCount">0 / 5000</span>
                        <button id="translateBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-6 py-2 rounded-lg transition shadow-md flex items-center space-x-2">
                            <span>Translate</span>
                            <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </div>
                </div>

                <div class="p-4 bg-slate-50/50 flex flex-col justify-between">
                    <div class="relative h-48 md:h-64">
                        <div id="loadingOverlay" class="absolute inset-0 bg-slate-50/80 flex items-center justify-center hidden">
                            <div class="animate-spin rounded-full h-8 w-8 border-4 border-indigo-600 border-t-transparent"></div>
                        </div>
                        <div id="outputText" class="w-full h-full p-2 text-slate-800 text-lg overflow-y-auto whitespace-pre-wrap select-text"></div>
                    </div>
                    
                    <div class="flex justify-end items-center space-x-2 pt-3 border-t border-slate-100">
                        <button id="copyBtn" title="Copy Translation" class="text-slate-500 hover:text-indigo-600 hover:bg-slate-100 p-2 rounded-lg transition">
                            <i class="fa-regular fa-copy text-lg"></i>
                        </button>
                        <button id="regenerateBtn" title="Regenerate Translation" class="text-slate-500 hover:text-indigo-600 hover:bg-slate-100 p-2 rounded-lg transition">
                            <i class="fa-solid fa-arrows-rotate text-lg"></i>
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer class="text-center py-4 text-xs text-slate-400 border-t border-slate-200 bg-white">
        Built with Flask, Tailwind, and OpenAI Integration.
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputText = document.getElementById('inputText');
            const outputText = document.getElementById('outputText');
            const translateBtn = document.getElementById('translateBtn');
            const regenerateBtn = document.getElementById('regenerateBtn');
            const copyBtn = document.getElementById('copyBtn');
            const sourceLang = document.getElementById('sourceLang');
            const targetLang = document.getElementById('targetLang');
            const loadingOverlay = document.getElementById('loadingOverlay');
            const charCount = document.getElementById('charCount');
            const swapLanguages = document.getElementById('swapLanguages');

            // Character Count Tracker
            inputText.addEventListener('input', () => {
                charCount.textContent = `${inputText.value.length} / 5000`;
            });

            // Core Translation Function
            async function performTranslation() {
                const textValue = inputText.value.trim();
                if (!textValue) return;

                loadingOverlay.classList.remove('hidden');
                outputText.classList.add('opacity-50');

                try {
                    const response = await fetch('/translate', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            text: textValue,
                            source_lang: sourceLang.value,
                            target_lang: targetLang.value
                        })
                    });

                    const data = await response.json();
                    
                    if (response.ok) {
                        outputText.textContent = data.translated_text;
                    } else {
                        outputText.innerHTML = `<span class="text-red-500">Error: ${data.error}</span>`;
                    }
                } catch (error) {
                    outputText.innerHTML = `<span class="text-red-500">Network Error: Could not connect to API.</span>`;
                } finally {
                    loadingOverlay.classList.add('hidden');
                    outputText.classList.remove('opacity-50');
                }
            }

            // Bind Event Actions with preventDefault to stop instant page flash resets
            translateBtn.addEventListener('click', (e) => {
                e.preventDefault();
                performTranslation();
            });

            regenerateBtn.addEventListener('click', (e) => {
                e.preventDefault();
                performTranslation();
            });

            // Copy Action Implementation
            copyBtn.addEventListener('click', (e) => {
                e.preventDefault();
                if (!outputText.textContent) return;
                navigator.clipboard.writeText(outputText.textContent).then(() => {
                    const icon = copyBtn.querySelector('i');
                    icon.className = 'fa-solid fa-check text-green-500';
                    setTimeout(() => { icon.className = 'fa-regular fa-copy text-lg'; }, 2000);
                });
            });

            // UI Language Swapping logic
            swapLanguages.addEventListener('click', (e) => {
                e.preventDefault();
                if (sourceLang.value === 'Auto-Detect') return;
                const temp = sourceLang.value;
                sourceLang.value = targetLang.value;
                targetLang.value = temp;
            });
        });
    </script>
</body>
</html>
